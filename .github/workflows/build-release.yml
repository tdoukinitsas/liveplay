name: Build and Release (Client)

# Cuts a client release whenever client/package.json's version field changes
# on main. The server has its own workflow (build-server.yml); a unified
# packaging pipeline will land in Milestone 6.
on:
  push:
    branches:
      - main
    paths:
      - 'client/package.json'

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version-changed: ${{ steps.version.outputs.changed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if version changed
        id: version
        run: |
          CURRENT_VERSION=$(node -p "require('./client/package.json').version")
          echo "version=v${CURRENT_VERSION}" >> $GITHUB_OUTPUT

          git diff HEAD^ HEAD -- client/package.json > package_diff.txt

          if grep -q '"version"' package_diff.txt; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Version changed to ${CURRENT_VERSION}"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Version not changed"
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.version-changed == 'true'
    timeout-minutes: 60
    strategy:
      matrix:
        include:
          - os: windows-latest
            triplet: x64-windows
          - os: ubuntu-latest
            triplet: x64-linux
          - os: macos-latest
            triplet: arm64-osx
    runs-on: ${{ matrix.os }}

    env:
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
      VCPKG_DEFAULT_TRIPLET: ${{ matrix.triplet }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # -------------------------------------------------------------------
      # C++ server toolchain — must build before the client so
      # electron-builder's extraResources can pick up the binary.
      # -------------------------------------------------------------------
      - name: Export VCPKG_ROOT
        shell: bash
        run: echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> "$GITHUB_ENV"

      - name: Configure vcpkg GHA cache
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Install Linux audio dev packages
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ninja-build pkg-config \
            libasound2-dev libpulse-dev libjack-jackd2-dev libx11-dev

      - name: Install macOS build tools
        if: runner.os == 'macOS'
        run: brew install ninja pkg-config

      - name: Install Windows build tools
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install ninja -y

      - name: Configure MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build C++ server
        shell: bash
        run: |
          cmake -S server -B server/build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }}
          cmake --build server/build --config Release -j

      - name: Stage server binary for electron-builder (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Ninja produces a single-config build; electron-builder expects
          # the Release sub-directory layout used by the multi-config preset.
          New-Item -ItemType Directory -Force "server/build/Release" | Out-Null
          if (Test-Path "server/build/liveplay-server.exe") {
            Copy-Item "server/build/liveplay-server.exe" "server/build/Release/" -Force
          }
          Get-ChildItem "server/build" -Filter "*.dll" -ErrorAction SilentlyContinue |
            ForEach-Object { Copy-Item $_.FullName "server/build/Release/" -Force }

      # -------------------------------------------------------------------
      # Client (Nuxt + Electron)
      # -------------------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Clean install dependencies
        shell: bash
        working-directory: client
        run: |
          rm -rf node_modules package-lock.json
          npm install --include=optional
        env:
          CI: true

      - name: Build Nuxt application
        working-directory: client
        run: npm run build

      - name: Build Electron app (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: client
        run: npm run electron:build -- --win --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI: true

      - name: Build Electron app (Linux)
        if: matrix.os == 'ubuntu-latest'
        working-directory: client
        run: npm run electron:build -- --linux --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI: true

      - name: Build Electron app (macOS)
        if: matrix.os == 'macos-latest'
        working-directory: client
        run: npm run electron:build -- --mac --x64 --arm64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI: true

      - name: Upload artifacts (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            client/dist-electron/*.exe
            client/dist-electron/*.exe.blockmap
          retention-days: 5

      - name: Upload artifacts (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            client/dist-electron/*.AppImage
            client/dist-electron/*.deb
            client/dist-electron/*.rpm
          retention-days: 5

      - name: Upload artifacts (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            client/dist-electron/*.dmg
            client/dist-electron/*.dmg.blockmap
            client/dist-electron/*.zip
          retention-days: 5

  release:
    needs: [check-version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: ./artifacts

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: ./artifacts

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-build
          path: ./artifacts

      - name: List downloaded artifacts
        run: |
          echo "Downloaded artifacts:"
          ls -lR ./artifacts

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"

          # Get the previous tag
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$PREVIOUS_TAG" ]; then
            COMMIT_RANGE="HEAD"
          else
            COMMIT_RANGE="${PREVIOUS_TAG}..HEAD"
          fi

          # Generate changelog
          echo "## What's Changed" > CHANGELOG.md
          echo "" >> CHANGELOG.md

          # Get commits since last tag
          git log ${COMMIT_RANGE} --pretty=format:"- %s (%an)" --no-merges >> CHANGELOG.md

          echo "" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "## Statistics" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "- **Commits**: $(git rev-list --count ${COMMIT_RANGE})" >> CHANGELOG.md
          echo "- **Contributors**: $(git log ${COMMIT_RANGE} --format='%an' --no-merges | sort -u | wc -l)" >> CHANGELOG.md

          # Add language support info
          LANG_COUNT=$(find client/locales -name "*.json" -type f | wc -l)
          echo "- **Supported Languages**: ${LANG_COUNT}" >> CHANGELOG.md

          cat CHANGELOG.md

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.check-version.outputs.version }}
          name: LivePlay ${{ needs.check-version.outputs.version }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
          files: |
            artifacts/*.exe
            artifacts/*.blockmap
            artifacts/*.AppImage
            artifacts/*.deb
            artifacts/*.rpm
            artifacts/*.dmg
            artifacts/*.zip
            artifacts/*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update latest release
        run: |
          echo "Release ${{ needs.check-version.outputs.version }} published successfully!"
          echo "Download at: https://github.com/${{ github.repository }}/releases/tag/${{ needs.check-version.outputs.version }}"
